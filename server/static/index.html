<!DOCTYPE html>
<html>

<head>
    <title>Neovim Server</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/svg+xml" href="neovim.svg">
</head>

<body>
    <div id="connection-form">
        <input type="text" id="nvim-address" placeholder="localhost:6666" value="localhost:6666">
        <button onclick="connectToNeovim();">Connect to Neovim</button>
        <button onclick="startNeovim();">Start Neovim</button>
        <div id="status"></div>
    </div>

    <canvas id="terminal" tabindex="0"></canvas>

    <div id="preview-pane">
        <div id="preview-header">
            <span>Markdown Preview</span>
            <button id="preview-close" onclick="closePreview();">✕</button>
        </div>
        <iframe id="preview-frame" src="about:blank"></iframe>
    </div>

    <script src="utility.js"></script>
    <script src="renderer.js"></script>
    <script src="client.js"></script>
    <script src="app.js"></script>
</body>

</html>
