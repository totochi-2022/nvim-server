<!DOCTYPE html>
<html>

<head>
    <title>Neovim Server</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/svg+xml" href="neovim.svg">
</head>

<body>
    <div id="connection-form">
        <div id="session-section">
            <div class="form-label">Sessions <button id="sessions-refresh" onclick="refreshSessions();">⟳</button></div>
            <div id="session-list"></div>
        </div>
        <div class="form-row">
            <input type="text" id="session-name" placeholder="new session name">
            <button onclick="startSession();">Start new</button>
        </div>
        <div class="form-row">
            <input type="text" id="nvim-address" placeholder="localhost:6666" value="localhost:6666">
            <button onclick="connectToNeovim();">Connect</button>
            <button onclick="startNeovim();">Start</button>
        </div>
        <div id="status"></div>
    </div>

    <canvas id="terminal" tabindex="0"></canvas>
    <!-- IME(日本語変換)用の隠し入力。canvasは編集不可なのでこれにキーボード
         フォーカスを置き、変換確定文字列を Neovim へ送る -->
    <textarea id="ime-input" autocomplete="off" autocorrect="off"
        autocapitalize="off" spellcheck="false"></textarea>

    <div id="preview-pane">
        <div id="preview-header">
            <span id="preview-title">Preview</span>
            <button id="preview-close" onclick="closePreview();">✕</button>
        </div>
        <iframe id="preview-frame" src="about:blank"></iframe>
    </div>

    <script src="utility.js"></script>
    <script src="renderer.js"></script>
    <script src="client.js"></script>
    <script src="app.js"></script>
</body>

</html>
